
services:
  database:
    image: postgres:15-alpine
    container_name: my_database
    restart: unless-stopped

    environment:
      POSTGRES_DB: donteploenergo
      POSTGRES_USER: user_donteploenergo
      POSTGRES_PASSWORD: donteploenergo

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./clean_db.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./BackEnd
    container_name: my_backend
    restart: unless-stopped
    depends_on:
      - database

    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: donteploenergo
      DB_USER: user_donteploenergo
      DB_PASSWORD: donteploenergo
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      FRONT_ADMIN_URL: https://dontploenergo.ru
      FRONT_USER_URL: https://www.dontploenergo.ru
      JWT_SECRET: my-super-secret-jwt-key-2025-donteploenergo
      REFRESH_SECRET: my-super-secret-refresh-key-2025-donteploenergo
    ports:
      - "8080:8080"
  frontadmin:
    build: ./FrontAdmin
    container_name: front_admin
    restart: unless-stopped

    ports:
      - "5173:80"

  frontuser:
    build: ./FrontUser
    container_name: front_user
    restart: unless-stopped

    ports:
      - "5174:80"

volumes:
  postgres_data:
